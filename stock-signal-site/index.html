<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>매수 시그널 · 강한 종목</title>
<style>
  :root{--bg:#17181d;--card:#20222a;--card2:#262934;--line:#262b36;--txt:#eaecef;--sec:#cdd2d9;--mut:#8b95a1;--dim:#5e6573;--red:#f04452;--blue:#3182f6;}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;font-size:13px}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.3px}
  .app{max-width:1120px;margin:0 auto;min-height:100vh;padding-bottom:74px}
  .topbar{padding:15px 16px 10px;display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg);z-index:30}
  .topbar .wm{font-size:17px;font-weight:700;letter-spacing:-.3px} .topbar .wm i{color:var(--blue);margin-right:7px;font-style:normal}
  .topbar .dt{font-size:11px;color:var(--dim);margin-left:auto}
  .seg2{display:inline-flex;background:var(--card);border-radius:999px;padding:3px}
  .seg2 span{font-size:12px;padding:6px 13px;cursor:pointer;color:var(--mut);border-radius:999px;font-weight:600}
  .seg2 span.on{background:var(--txt);color:var(--bg);font-weight:700}
  .body{padding:2px 16px}
  .banner{font-size:12px;color:var(--dim);margin:2px 2px 12px}
  .status{font-size:12px;color:var(--dim);min-height:14px;margin:0 2px}
  .warn{background:#2a1f17;border:1px solid #5a3a1e;color:#e6a86b;border-radius:10px;padding:9px 12px;font-size:12px;margin:8px 0;display:none}
  /* 시장 띠 */
  .mkts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  @media(max-width:560px){.mkts{grid-template-columns:1fr 1fr 1fr;gap:6px}}
  .mk{background:var(--card);border-radius:14px;padding:11px 12px}
  .mk .top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
  .mk .nm{font-size:12px;font-weight:600;color:var(--sec)}
  .mk .rg{font-size:10px;font-weight:700;margin-left:auto;padding:2px 7px;border-radius:999px}
  .mk .big{font-size:20px;font-weight:700;line-height:1}
  .mk .big small{font-size:10px;color:var(--dim);font-weight:500;margin-left:3px}
  .mk svg{display:block;margin-top:5px}
  .mk .sub{font-size:10px;color:var(--mut);margin-top:3px;font-weight:500}
  /* 투자 가이드 */
  .guide{background:var(--card);border-radius:16px;padding:15px 16px;margin-bottom:12px}
  .ghead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .gic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px}
  .gst{font-size:16px;font-weight:700}.gsub{font-size:11px;color:var(--dim);margin-top:1px}
  .gbar{display:flex;height:34px;border-radius:9px;overflow:hidden;margin-bottom:9px}
  .gbar>div{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;min-width:0}
  .gwhy{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .gchip{font-size:11px;font-weight:600;padding:4px 9px;border-radius:999px;background:var(--card2);color:var(--sec)}
  .gmsg{font-size:13px;line-height:1.6;color:var(--sec);background:#1b1d24;border-radius:11px;padding:11px 12px}
  .bset{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--mut);margin:2px 0 10px}
  .bset input{width:80px;padding:6px 8px;border-radius:8px;border:1px solid var(--line);background:var(--card2);color:var(--txt);font:inherit;font-size:12px}
  .mk.hero{border:1px solid #f0445255;background:#241a1d}
  .myw{font-size:9px;background:#f0445222;color:#f04452;padding:1px 5px;border-radius:4px;font-weight:700;margin-left:4px}
  /* 섹션 라벨 */
  .lab{font-size:13px;font-weight:700;color:var(--sec);margin:18px 2px 9px;letter-spacing:-.2px;display:flex;align-items:center;gap:8px}
  .lab .hint{font-size:11px;color:var(--dim);font-weight:500}
  /* 섹터 색칩 */
  .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .chips::-webkit-scrollbar{height:0}
  .schip{flex:0 0 auto;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;border:2px solid transparent;white-space:nowrap}
  .schip b{margin-left:5px;font-weight:800}
  .schip.on{border-color:#fff}
  .schip.all{background:var(--card);color:var(--mut)} .schip.all.on{border-color:var(--blue);color:var(--txt)}
  /* 필터 */
  .filters{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:4px 0 6px}
  .fl{font-size:11px;color:var(--dim)}
  .pill{padding:5px 11px;border-radius:999px;background:var(--card);color:var(--mut);font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap}
  .pill.on{background:#2c3340;color:var(--txt);font-weight:700}
  select{padding:6px 10px;border-radius:999px;border:none;background:var(--card);color:var(--txt);font:inherit;font-size:12px;font-weight:500;margin-left:auto}
  .count{font-size:12px;color:var(--dim);margin:6px 4px}
  .twrap{overflow-x:auto;background:var(--card);border-radius:14px}
  table{border-collapse:collapse;width:100%;min-width:560px;font-size:12px}
  th,td{padding:10px 10px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line)}
  th{color:var(--dim);font-weight:600;font-size:11px}
  th.l,td.l{text-align:left} tbody tr{cursor:pointer} tbody tr:hover{background:var(--card2)} tbody tr:last-child td{border-bottom:none}
  .rsb{display:inline-block;min-width:30px;padding:2px 7px;border-radius:6px;font-weight:700;font-size:11px;text-align:center;color:#fff}
  .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:#2c3340;color:var(--sec)}
  .ctag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:#2c3340;color:var(--mut);margin-left:4px}
  .chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px}
  .chip.in{background:#3a1f23;color:#ff8a90} .chip.below{background:#1c2740;color:#8fb6ff} .chip.above{background:#2a2418;color:#e6b86b}
  .up{color:var(--red);font-weight:700}.down{color:var(--blue);font-weight:700}
  .empty{text-align:center;color:var(--mut);font-size:13px;padding:40px 16px;line-height:1.9}
  .nav{position:fixed;bottom:0;left:0;right:0;background:#1b1c22;border-top:1px solid var(--line);display:flex;overflow-x:auto;z-index:40}
  .nav .inner{max-width:1120px;margin:0 auto;display:flex;width:100%}
  .nav a{flex:1 0 auto;min-width:64px;text-align:center;padding:8px 6px;font-size:10px;color:var(--dim);text-decoration:none;cursor:pointer}
  .nav a .ic{font-size:16px;display:block;margin-bottom:3px}.nav a.on{color:var(--blue)}
  .toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:#2c3340;color:#fff;padding:9px 16px;border-radius:999px;font-size:12px;opacity:0;transition:.25s;z-index:70;pointer-events:none}
  .toast.show{opacity:.97}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;z-index:60}
  .overlay.show{display:flex}
  .modal{background:var(--card);width:100%;max-width:620px;max-height:88vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:18px}
  @media(min-width:560px){.overlay{align-items:center}.modal{border-radius:20px}}
  .mtop{display:flex;align-items:flex-start;gap:10px;margin-bottom:4px}
  .mtop .nm{font-weight:700;font-size:17px;flex:1}.mtop .nm small{display:block;color:var(--mut);font-weight:500;font-size:11px;margin-top:2px}
  .mclose{cursor:pointer;color:var(--mut);font-size:22px;line-height:1}
  .zone{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;margin:12px 0 2px}
  .kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0;font-size:14px}
  .kpis div span{display:block;color:var(--mut);font-size:11px;margin-bottom:2px}.kpis div b{font-weight:700}
  canvas{width:100%;height:auto;background:var(--card2);border-radius:12px;margin-top:12px}
  table.bt{min-width:auto;background:transparent;margin-top:6px} table.bt tr.best td{background:#2a2418}
  .legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--dim);margin-top:8px}
  .legend i{display:inline-block;width:13px;height:3px;border-radius:2px;vertical-align:middle;margin-right:4px;font-style:normal}
  .disc{font-size:11px;color:var(--dim);line-height:1.7;margin:18px 4px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="wm"><i>●</i>매수 시그널 <span style="font-size:10px;color:#5e6573;font-weight:600;letter-spacing:0">v3 맞춤</span></span>
    <span class="dt num" id="updTop"></span>
  </div>
  <div class="body">
    <div class="banner" id="bannerTxt">불러오는 중…</div>
    <div class="status" id="status"></div>
    <div class="warn" id="warn"></div>
    <div id="view"></div>
    <div class="disc">매일 아침(KST 07:30경) 서버 자동 집계 · 무료 데이터(Stooq·Yahoo) · 일봉 종가 백테스트(최신편향 반영). <b style="color:var(--red)">빨강=강함, 파랑=약함</b>. 현금/투자 비중은 추세추종 전략 기반 참고치이며 투자 권유가 아닙니다. 특정 종목 추천 아님, 투자 책임은 본인.</div>
  </div>
  <div class="nav"><div class="inner" id="navInner"></div></div>
  <div class="toast" id="toast"></div>
  <div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
</div>
<script>
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const HP=[2,3,5,10,20,60,126,252];const RED="#f04452",BLUE="#3182f6";
const F={country:"all",signal:"all",rs:"70",sector:"all",scountry:"all",swin:"90"};
let SORT="ev",CAT="trend";
let DATA=null,TREND=[],SEASON=[],STOCKS=[],MARKET={},SIGNDATE="",STOCKMAP={},CANDMAP={};
const MKMETA={us:"미국 S&P500",kr:"한국 KOSPI",jp:"일본 N225"},CFLAG={us:"미국",kr:"한국",jp:"일본"};
const countryOf=s=>s.endsWith(".kr")?"kr":s.endsWith(".jp")?"jp":"us";
const curOf=s=>s.endsWith(".kr")?"₩":s.endsWith(".jp")?"¥":"$";
function fmt(v,sym){if(v==null||!isFinite(v))return"-";const d=(sym&&(sym.endsWith(".kr")||sym.endsWith(".jp")))||v>=500?0:2;return curOf(sym||"")+Number(v).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});}
function setStatus(t){$("#status").textContent=t;}
function showWarn(t){const w=$("#warn");if(!t){w.style.display="none";return;}w.innerHTML=t;w.style.display="block";}
function toast(t){const e=$("#toast");e.textContent=t;e.classList.add("show");clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove("show"),1600);}
function hmOf(iso){try{return new Date(iso).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}catch(e){return iso;}}
function heat(rs){const base=[42,46,56];let tg,t;rs=Math.max(1,Math.min(99,rs||0));if(rs>=50){t=(rs-50)/49;tg=[240,68,82];}else{t=(50-rs)/50;tg=[49,130,246];}return 'rgb('+base.map((b,i)=>Math.round(b+(tg[i]-b)*t)).join(',')+')';}

async function load(spin){if(spin)setStatus("불러오는 중…");
  try{const r=await fetch("data.json?ts="+Date.now(),{cache:"no-store"});if(!r.ok)throw 0;DATA=await r.json();}catch(e){DATA=null;}
  if(!DATA||DATA.placeholder||!DATA.trend){renderEmpty();return;}
  TREND=DATA.trend||[];SEASON=DATA.season||[];STOCKS=DATA.stocks||[];MARKET=DATA.market||{};SIGNDATE=DATA.signdate||"—";
  STOCKMAP={};STOCKS.forEach(s=>STOCKMAP[s.sym]=s);
  CANDMAP={};TREND.forEach(a=>{if(a.sigs&&a.sigs.length){const s=a.sigs.reduce((b,x)=>x.st[x.bh].ev>b.st[b.bh].ev?x:b);CANDMAP[a.sym]={a,s};}});
  setStatus(DATA.coverage?`${DATA.coverage.analyzed}/${DATA.coverage.universe}종목 분석`:`${STOCKS.length}종목`);
  $("#updTop").textContent="업데이트 "+hmOf(DATA.builtAt);
  route();
}
function renderEmpty(){$("#bannerTxt").textContent="데이터 준비 전";$("#view").innerHTML=`<div class="empty">아직 집계된 데이터가 없습니다.<br>GitHub <b>Actions → Update signals → Run workflow</b> 를 한 번 실행하세요.</div>`;}
function route(){if(!DATA||DATA.placeholder){renderEmpty();return;}renderTrend();}

function spark(arr,up){if(!arr||arr.length<2)return"";const W=100,H=24,mn=Math.min(...arr),mx=Math.max(...arr),pad=2;
  const pts=arr.map((v,i)=>[pad+i/(arr.length-1)*(W-2*pad),H-pad-(v-mn)/((mx-mn)||1)*(H-2*pad)]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=d+` L ${pts[pts.length-1][0].toFixed(1)} ${H} L ${pts[0][0].toFixed(1)} ${H} Z`;const c=up?RED:BLUE,l=pts[pts.length-1];
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><path d="${area}" fill="${c}" fill-opacity="0.12"/><path d="${d}" fill="none" stroke="${c}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${l[0].toFixed(1)}" cy="${l[1].toFixed(1)}" r="2.3" fill="${c}"/></svg>`;}
function marketCard(c){const m=MARKET[c];if(!m)return"";const up=m.ok&&m.have,col=up?RED:BLUE,a2=(m.above200*100||0),hero=c==="us";
  return `<div class="mk${hero?' hero':''}"><div class="top"><span class="nm">${CFLAG[c]}${hero?'<span class="myw">핵심 80%</span>':''}</span><span class="rg" style="color:${col};background:${col}22">${m.have?(up?'상승':'약세'):'-'}</span></div>
    <div class="big num">${a2.toFixed(0)}<small>% 200▲</small></div>${spark(m.spark,up)}
    <div class="sub num">신고 ${m.newHigh||0}·신저 ${m.newLow||0}</div></div>`;}

function sectorChipsHTML(){
  const list=STOCKS.filter(s=>F.country==="all"||s.country===F.country);
  const by={};list.forEach(s=>{(by[s.sector]=by[s.sector]||[]).push(s);});
  const arr=Object.keys(by).map(name=>({name,avg:Math.round(by[name].reduce((a,b)=>a+b.rs,0)/by[name].length)})).sort((a,b)=>b.avg-a.avg);
  let h=`<div class="chips"><span class="schip all ${F.sector==='all'?'on':''}" data-s="all">전체</span>`;
  arr.forEach(s=>{h+=`<span class="schip ${F.sector===s.name?'on':''}" data-s="${s.name}" style="background:${heat(s.avg)}">${s.name}<b class="num">${s.avg}</b></span>`;});
  return h+`</div>`;
}
function buildCands(){let cands=[];
  for(const a of TREND){
    if(F.country!=="all"&&(a.country||countryOf(a.sym))!==F.country)continue;
    if(F.sector!=="all"&&a.sector!==F.sector)continue;
    if(F.rs!=="0"&&a.rs<Number(F.rs))continue;
    for(const s of(a.sigs||[])){
      if(F.signal!=="all"&&s.type!==F.signal)continue;
      if(s.status!=="in")continue;
      const b=s.st[s.bh];cands.push({a,s,ev:b.ev,rs:a.rs,win:b.winRate,payoff:b.payoff});}}
  const by={};for(const c of cands){const k=c.a.sym;if(!by[k]||c.ev>by[k].ev)by[k]=c;}cands=Object.values(by);
  cands.sort((x,y)=>SORT==="rs"?y.rs-x.rs:SORT==="win"?y.win-x.win:SORT==="payoff"?y.payoff-x.payoff:y.ev-x.ev);return cands;}

function guideCard(){
  const mScore=k=>{const x=MARKET[k];if(!x||!x.have)return null;return (x.ok?55:0)+(x.above200||0)*45;};
  const us=mScore("us"),kr=mScore("kr"),jp=mScore("jp");
  const setups=TREND.filter(a=>(a.sigs||[]).some(s=>s.status==="in")).length;
  let score=Math.round(0.8*(us||0)+0.1*(kr||0)+0.1*(jp||0));
  if(setups<5)score=Math.min(score,30);
  const invest=Math.max(0,Math.min(100,Math.round(score/5)*5)),cash=100-invest;
  const usUp=MARKET.us&&MARKET.us.have&&MARKET.us.ok;
  let label,icon,iconbg,msg;
  if(score>=66){label="투자하기 좋은 구간";icon="📈";iconbg="#f0445222";
    msg=`미국이 추세 위에 있습니다(내 비중 80%). 강한 종목 위주로 핵심 자금을 천천히 분할 매수하기 좋은 구간이에요.`;}
  else if(score>=33){label="선별 투자 구간";icon="⚖️";iconbg="#d3a24a22";
    msg=`미국 추세가 약하거나 애매합니다. 핵심은 아끼고, 정말 강한 자리만 소량 선별하세요.`;}
  else{label="쉬어가는 구간";icon="🌙";iconbg="#3182f622";
    msg=`미국이 약세라(내 비중 80%) 핵심 자금은 쉬는 편이 통계적으로 유리합니다. 횡보·약세장의 무리한 매수는 평균 손실이 큽니다. 현금은 다음 기회의 실탄이고(이자도 받습니다), 좋은 자리는 사라지지 않아요 — 강세로 돌아서면 아래 목록이 다시 채워집니다. <b>뒤처지는 게 아니라 손실을 피하는 중</b>이에요.`;}
  const why=[`미국 ${usUp?'상승':'약세'}`,`매수자리 ${setups}개`,`현금 ${cash}% 대기·이자`];
  return `<div class="guide"><div class="ghead"><div class="gic" style="background:${iconbg}">${icon}</div>
    <div><div class="gst">${label}</div><div class="gsub">미국 우선 가이드 · 참고용</div></div></div>
    <div class="gbar"><div style="width:${invest}%;background:#f04452">투자 ${invest}%</div><div style="width:${cash}%;background:#2b4d8a">현금 ${cash}%</div></div>
    <div class="gwhy">${why.map(w=>`<span class="gchip">${w}</span>`).join("")}</div>
    <div class="gmsg">${msg}</div></div>`;
}
function getSet(){return {pct:Number(localStorage.getItem('tf_explorePct')||15),cap:localStorage.getItem('tf_capital')||""};}
function bucketsCard(){
  const {pct,cap}=getSet(),corePct=100-pct,capN=Number(String(cap).replace(/[^0-9.]/g,''));
  const won=v=>'약 '+Math.round(v).toLocaleString()+'만원';
  const coreT=capN?won(capN*corePct/100):corePct+'%', expT=capN?won(capN*pct/100):pct+'%';
  return `<div class="guide"><div class="ghead"><div class="gic" style="background:#3182f622">🧰</div>
    <div><div class="gst">두 주머니</div><div class="gsub">핵심은 규칙대로 · 탐색은 한도 내 자유</div></div></div>
    <div class="gbar"><div style="width:${corePct}%;background:#2b4d8a">핵심 ${corePct}%</div><div style="width:${pct}%;background:#f04452">탐색 ${pct}%</div></div>
    <div class="gwhy"><span class="gchip">핵심 ${coreT} · 가이드 따라 분할</span><span class="gchip">탐색 ${expT} · 충동은 여기서</span></div>
    <div class="bset"><span>탐색 비중</span><input id="bExp" type="number" min="0" max="50" value="${pct}"><span>%</span>
      <span style="margin-left:8px">총자본(만원·선택)</span><input id="bCap" type="number" value="${cap}" placeholder="예: 10000"></div>
    <div class="gmsg">충동이 일면 핵심이 아니라 <b>탐색 주머니</b>에서 푸세요. 한도(${pct}%)까지는 자유, 그 너머는 당신 선택이에요(막지 않습니다). 핵심은 가이드가 ‘투자 구간’일 때만 천천히 들어갑니다.</div></div>`;
}
function renderTrend(){
  $("#bannerTxt").textContent=`기준일 ${SIGNDATE} · 위: 가이드 → 시장 → 섹터 → 강한 종목`;
  const cands=buildCands();
  let h=guideCard()+bucketsCard()+`<div class="mkts">${["us","kr","jp"].map(marketCard).join("")}</div>`;
  h+=`<div class="lab">섹터 강도 <span class="hint">탭하면 그 섹터만</span></div>`+sectorChipsHTML();
  h+=`<div class="lab">가장 강한 종목 <span class="hint">매수 자리 잡힌 강세주</span></div>`;
  h+=`<div class="filters">
      <span class="pill ${F.country==='all'?'on':''}" data-g="country" data-v="all">전체</span>
      <span class="pill ${F.country==='us'?'on':''}" data-g="country" data-v="us">미국</span>
      <span class="pill ${F.country==='kr'?'on':''}" data-g="country" data-v="kr">한국</span>
      <span class="pill ${F.country==='jp'?'on':''}" data-g="country" data-v="jp">일본</span>
      <span class="fl" style="margin-left:4px">RS</span>
      <span class="pill ${F.rs==='0'?'on':''}" data-g="rs" data-v="0">전체</span>
      <span class="pill ${F.rs==='70'?'on':''}" data-g="rs" data-v="70">≥70</span>
      <span class="pill ${F.rs==='90'?'on':''}" data-g="rs" data-v="90">≥90</span>
      <select id="sortSel">
        <option value="ev"${SORT==='ev'?' selected':''}>EV순</option><option value="rs"${SORT==='rs'?' selected':''}>RS순</option>
        <option value="win"${SORT==='win'?' selected':''}>승률순</option><option value="payoff"${SORT==='payoff'?' selected':''}>손익비순</option></select>
    </div>`;
  if(!cands.length){ h+=`<div class="empty">조건에 맞는 매수 자리가 없습니다.<br><span class="hint">RS를 ‘전체’로, 섹터를 ‘전체’로 바꿔보세요.</span></div>`; }
  else{
    h+=`<div class="count">${cands.length}종목 · ${({ev:"EV",rs:"RS",win:"승률",payoff:"손익비"})[SORT]}순</div>`;
    h+=`<div class="twrap"><table><thead><tr><th class="l">#</th><th class="l">종목</th><th class="l">신호</th><th>RS</th><th class="l">매수구간</th><th>승률</th><th>손익비</th><th>EV</th></tr></thead><tbody>`;
    cands.forEach((c,i)=>{const{a,s}=c;const b=s.st[s.bh];const m=MARKET[a.country];const weak=m&&m.have&&!m.ok;
      h+=`<tr data-sym="${a.sym}"><td class="num">${i+1}</td>
        <td class="l"><b>${a.name}</b>${weak?'<span class="ctag">약세장</span>':''}<div class="hint">${a.sym} · ${a.sector}</div></td>
        <td class="l"><span class="badge">${s.badge}</span> <span class="hint">${s.desc}</span></td>
        <td><span class="rsb num" style="background:${heat(a.rs)}">${a.rs}</span></td>
        <td class="l num">${fmt(s.zoneLo,a.sym)}~${fmt(s.zoneHi,a.sym)} <span class="chip ${s.status}">구간내</span></td>
        <td class="num">${(b.winRate*100).toFixed(0)}%</td><td class="num">${b.payoff.toFixed(2)}</td><td class="num"><b>${b.ev.toFixed(2)}</b></td></tr>`;});
    h+=`</tbody></table></div>`;
  }
  $("#view").innerHTML=h;
  const bE=$("#bExp");if(bE)bE.addEventListener("change",e=>{localStorage.setItem('tf_explorePct',Math.max(0,Math.min(50,Number(e.target.value)||0)));renderTrend();});
  const bC=$("#bCap");if(bC)bC.addEventListener("change",e=>{localStorage.setItem('tf_capital',e.target.value.replace(/[^0-9.]/g,''));renderTrend();});
  $("#view").querySelectorAll(".schip").forEach(c=>c.addEventListener("click",()=>{F.sector=c.dataset.s;renderTrend();}));
  $("#view").querySelectorAll(".pill").forEach(p=>p.addEventListener("click",()=>{F[p.dataset.g]=p.dataset.v;renderTrend();}));
  const ss=$("#sortSel");if(ss)ss.addEventListener("change",e=>{SORT=e.target.value;renderTrend();});
  $("#view").querySelectorAll("tr[data-sym]").forEach(tr=>tr.addEventListener("click",()=>openStock(tr.dataset.sym)));
}

function renderSeason(){
  $("#bannerTxt").textContent=`계절성 기준일 ${SIGNDATE} · 오늘 매수창(−2~+5일) · 승률>${F.swin}%`;
  let h=`<div class="filters">
    <span class="pill ${F.scountry==='all'?'on':''}" data-g="scountry" data-v="all">글로벌</span>
    <span class="pill ${F.scountry==='us'?'on':''}" data-g="scountry" data-v="us">미국</span>
    <span class="pill ${F.scountry==='kr'?'on':''}" data-g="scountry" data-v="kr">한국</span>
    <span class="pill ${F.scountry==='jp'?'on':''}" data-g="scountry" data-v="jp">일본</span>
    <span class="fl" style="margin-left:4px">승률</span>
    <span class="pill ${F.swin==='90'?'on':''}" data-g="swin" data-v="90">≥90%</span>
    <span class="pill ${F.swin==='80'?'on':''}" data-g="swin" data-v="80">≥80%</span></div>`;
  let res=(SEASON||[]).filter(r=>{if(F.scountry!=="all"&&r.country!==F.scountry)return false;if(r.wr*100<Number(F.swin))return false;return true;});
  if(!res.length){h+=`<div class="empty">오늘 매수창에 해당하는 계절성 종목이 없습니다.<br><span class="hint">승률을 ≥80%로, 국가를 글로벌로.</span></div>`;}
  else{const mm=d=>{const dt=new Date(new Date().getFullYear(),0,d);return `${dt.getMonth()+1}/${dt.getDate()}`;};
    h+=`<div class="count">${res.length}종목 · 승률순</div><div class="twrap"><table><thead><tr><th class="l">#</th><th class="l">종목</th><th>승률</th><th class="l">매수창</th><th>보유</th><th>평균</th><th>연수</th></tr></thead><tbody>`;
    res.forEach((r,i)=>{h+=`<tr><td class="num">${i+1}</td><td class="l"><b>${r.name}</b><div class="hint">${r.sym} · ${r.sector}</div></td>
      <td><span class="rsb num" style="background:${heat(r.wr*100)}">${(r.wr*100).toFixed(0)}</span></td>
      <td class="l num">${mm(r.start)}~</td><td class="num">${r.hold}일</td><td class="up num">+${(r.avg*100).toFixed(1)}%</td><td class="num">${r.years}년</td></tr>`;});
    h+=`</tbody></table></div>`;}
  $("#view").innerHTML=h;
  $("#view").querySelectorAll(".pill").forEach(p=>p.addEventListener("click",()=>{F[p.dataset.g]=p.dataset.v;renderSeason();}));
}

function openStock(sym){const cand=CANDMAP[sym];if(cand){openDetail(cand.a,cand.s);return;}
  const s=STOCKMAP[sym];if(!s)return;
  $("#modal").innerHTML=`<div class="mtop"><div class="nm">${s.name}<small>${s.sym} · ${s.sector}</small></div><span class="mclose">×</span></div>
    <div class="kpis"><div><span>종합 RS</span><b><span class="rsb num" style="background:${heat(s.rs)}">${s.rs}</span></b></div>
    <div><span>장기추세</span><b class="${s.above200?'up':'down'}">${s.above200?'200일선 위':'200일선 아래'}</b></div>
    <div><span>매수신호</span><b class="hint">현재 없음</b></div></div><div class="hint">현재 유효한 매수 셋업이 없습니다.</div>`;
  $("#modal").querySelector(".mclose").onclick=closeModal;$("#overlay").classList.add("show");}
function openDetail(a,s){const b=s.st[s.bh];const st={in:"구간 내",below:"구간 아래",above:"구간 위"}[s.status];
  const rows=HP.map(h=>{const x=s.st[h];const star=h===s.bh?' ★':'';const dis=x.n<20?' style="opacity:.4"':'';
    return `<tr class="${h===s.bh?'best':''}"${dis}><td class="l num">${h}일${star}</td><td class="up num">+${(x.avgWin*100).toFixed(1)}%</td><td class="down num">−${(x.avgLoss*100).toFixed(1)}%</td><td class="num">${(x.winRate*100).toFixed(0)}%</td><td class="num">${x.payoff.toFixed(2)}</td><td class="num">${x.n}</td></tr>`;}).join("");
  $("#modal").innerHTML=`<div class="mtop"><div class="nm">${a.name}<small>${a.sym} · ${a.sector}</small></div><span class="badge">${s.badge}</span><span class="mclose">×</span></div>
    <div class="zone">매수 구간 <b class="num">${fmt(s.zoneLo,a.sym)} ~ ${fmt(s.zoneHi,a.sym)}</b> <span class="chip ${s.status}">${st}</span> <span class="hint num">· 종가 ${fmt(a.price,a.sym)}</span></div>
    <div class="hint">${s.desc}</div>
    <div class="kpis"><div><span>종합 RS</span><b><span class="rsb num" style="background:${heat(a.rs)}">${a.rs}</span></b></div>
      <div><span>승률</span><b class="num">${(b.winRate*100).toFixed(1)}%</b></div><div><span>표본수</span><b class="num">${b.n}</b></div>
      <div><span>평균이익</span><b class="up num">+${(b.avgWin*100).toFixed(1)}%</b></div><div><span>평균손실</span><b class="down num">−${(b.avgLoss*100).toFixed(1)}%</b></div>
      <div><span>손익비·EV</span><b class="num">${b.payoff.toFixed(2)} · ${b.ev.toFixed(2)}</b></div></div>
    <div class="hint">8기간 성적표</div>
    <div class="twrap" style="margin-top:4px;background:transparent"><table class="bt"><thead><tr><th class="l">보유</th><th>평균이익</th><th>평균손실</th><th>승률</th><th>손익비</th><th>표본</th></tr></thead><tbody>${rows}</tbody></table></div>
    <canvas height="220"></canvas>
    <div class="legend"><span><i style="background:#eaecef"></i>종가</span><span><i style="background:#3182f6"></i>이동평균선</span><span><i style="background:#f04452"></i>매수구간</span></div>`;
  $("#modal").querySelector(".mclose").onclick=closeModal;$("#overlay").classList.add("show");
  requestAnimationFrame(()=>drawChart($("#modal").querySelector("canvas"),a,s));}
function closeModal(){$("#overlay").classList.remove("show");}
$("#overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closeModal();});
function drawChart(cv,a,s){const dpr=window.devicePixelRatio||1,W=cv.clientWidth,H=220;cv.width=W*dpr;cv.height=H*dpr;const ctx=cv.getContext("2d");ctx.scale(dpr,dpr);
  const view=(a.closes||[]).slice(-220),off=(a.closes||[]).length-view.length;const ma=s.arr?view.map((_,i)=>s.arr[off+i]):null;
  let mn=Math.min(...view),mx=Math.max(...view);if(ma)ma.forEach(v=>{if(v!=null){mn=Math.min(mn,v);mx=Math.max(mx,v);}});if(s.zoneLo){mn=Math.min(mn,s.zoneLo);mx=Math.max(mx,s.zoneHi);}
  const pad=(mx-mn)*.08||1;mn-=pad;mx+=pad;const L=46,R=8,T=8,B=16;const x=i=>L+i/(view.length-1)*(W-L-R),y=v=>T+(1-(v-mn)/(mx-mn))*(H-T-B);
  ctx.clearRect(0,0,W,H);ctx.strokeStyle="#2a2e38";ctx.fillStyle="#5e6573";ctx.font="10px sans-serif";
  for(let g=0;g<=4;g++){const yy=T+g/4*(H-T-B);const val=mx-g/4*(mx-mn);ctx.beginPath();ctx.moveTo(L,yy);ctx.lineTo(W-R,yy);ctx.stroke();ctx.fillText(val.toLocaleString(undefined,{maximumFractionDigits:mx<100?1:0}),3,yy+3);}
  if(s.zoneLo){ctx.fillStyle="rgba(240,68,82,.14)";ctx.fillRect(L,y(s.zoneHi),W-L-R,y(s.zoneLo)-y(s.zoneHi));}
  const line=(ser,col,w)=>{ctx.strokeStyle=col;ctx.lineWidth=w;ctx.beginPath();let st=false;ser.forEach((v,i)=>{if(v==null)return;const px=x(i),py=y(v);if(!st){ctx.moveTo(px,py);st=true;}else ctx.lineTo(px,py);});ctx.stroke();};
  if(ma)line(ma,"#3182f6",1.2);line(view,"#eaecef",1.6);}

const NAV=[["🛒","추세추종","trend"],["📊","차트"],["⭐","관심"],["🔗","상관"],["📈","매크로"],["🎚️","스크리너"],["📚","ETF"]];
$("#navInner").innerHTML=NAV.map((n,i)=>`<a class="${i===0?'on':''}" data-i="${i}"><span class="ic">${n[0]}</span>${n[1]}</a>`).join("");
$$("#navInner a").forEach(a=>a.addEventListener("click",()=>{const n=NAV[a.dataset.i];if(n[2])route();else toast(n[1]+" — 준비중");}));
document.addEventListener("visibilitychange",()=>{if(!document.hidden)load(false);});
load(true);
</script>
