name: Update signals

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - "stock-signal-site/data.json"

permissions:
  contents: write

concurrency:
  group: update-signals
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build data.json
        run: node stock-signal-site/scripts/build.mjs
      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock-signal-site/data.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: update signals"
            git push
          fi
